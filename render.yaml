services:
  - type: web
    name: edulink-api
    env: python
    region: ohio
    buildCommand: "./backend/build.sh"
    startCommand: "cd backend && gunicorn edulink_backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-vercel-domain.vercel.app"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true
