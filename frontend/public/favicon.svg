<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="20" fill="#0f172a"/>
  
  <!-- Graduation cap top (board) -->
  <polygon points="50,18 88,36 50,54 12,36" fill="#38bdf8"/>
  
  <!-- Cap sides hanging down -->
  <rect x="44" y="50" width="12" height="22" rx="2" fill="#0ea5e9"/>
  
  <!-- Left side of cap hanging string -->
  <line x1="88" y1="36" x2="88" y2="58" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Tassel ball -->
  <circle cx="88" cy="62" r="5" fill="#f472b6"/>
</svg>